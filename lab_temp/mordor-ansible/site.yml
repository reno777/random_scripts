---
# site.yml — Mordor Proxmox cluster maintenance playbook
#
# Usage:
#   Run everything (repos + nosub + cluster + update):
#     ansible-playbook site.yml
#
#   Fix repos only:
#     ansible-playbook site.yml --tags repos
#
#   Nosub UI patch only:
#     ansible-playbook site.yml --tags nosub
#
#   SSH key distribution only:
#     ansible-playbook site.yml --tags keys
#
#   Cluster create/join only:
#     ansible-playbook site.yml --tags cluster
#
#   Update packages only:
#     ansible-playbook site.yml --tags update
#
#   Target a single node:
#     ansible-playbook site.yml --limit sauron
#
#   Dry run (check mode — no changes made):
#     ansible-playbook site.yml --check
#
# IMPORTANT: serial: 1 in Play 2 means nodes are processed one at a time.
# Do not remove this — ensures sauron creates the cluster before other
# nodes try to join, and prevents quorum loss during reboots.
#
# Play 1 runs across ALL hosts simultaneously (no serial) so that every
# node's keys are collected before distribution. serial: 1 would break
# this since hostvars facts from other hosts wouldn't exist yet.

# ── Play 1: SSH Key Distribution (all hosts simultaneously) ──────────────────

- name: Distribute SSH keys across all nodes
  hosts: proxmox_nodes
  become: false
  gather_facts: false

  tasks:
    - name: Ensure /root/.ssh exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Fetch authorized_keys from each node to controller
      fetch:
        src: /root/.ssh/authorized_keys
        dest: /tmp/mordor-keys/{{ inventory_hostname }}/authorized_keys
        flat: yes

    - name: Combine all keys on controller
      shell: |
        cat /tmp/mordor-keys/*/authorized_keys | sort -u > /tmp/mordor-keys/combined_authorized_keys
      delegate_to: localhost
      run_once: true

    - name: Push combined authorized_keys to all nodes
      copy:
        src: /tmp/mordor-keys/combined_authorized_keys
        dest: /root/.ssh/authorized_keys
        owner: root
        group: root
        mode: '0600'

    - name: Accept SSH host keys from all nodes
      shell: |
        ssh-keyscan -H {{ hostvars[item]['ansible_host'] }} >> /root/.ssh/known_hosts
        sort -u /root/.ssh/known_hosts -o /root/.ssh/known_hosts
      loop: "{{ ansible_play_hosts }}"
      changed_when: false

# ── Play 2: Node Configuration (serial — one at a time) ──────────────────────

- name: Proxmox node maintenance
  hosts: proxmox_nodes
  serial: 1        # one node at a time — sauron first, preserves quorum
  become: false
  gather_facts: true

  roles:
    - role: pve-repos
      tags: [repos]

    - role: pve-nosub-patch
      tags: [nosub]

    - role: pve-cluster
      tags: [cluster]

    - role: pve-node-setup
      tags: [nodesetup]

    # - role: pve-update
    #   tags: [update]
