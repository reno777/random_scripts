---
# roles/pve-cluster/tasks/main.yml
# Handles cluster creation on sauron and joining on all other nodes.
#
# NOTE: SSH key distribution is handled in a separate play in site.yml
# that runs across all hosts simultaneously before this role executes.
#
# Run order matters — sauron must be first in inventory so the cluster
# exists before other nodes try to join. serial: 1 in site.yml ensures this.
#
# Idempotent — checks cluster membership before acting:
#   - Already in a cluster → skip
#   - sauron, not in cluster → pvecm create mordor
#   - Other node, not in cluster → pvecm add with --use_ssh

# ── Check current cluster state ───────────────────────────────────────────────

- name: Check if corosync.conf exists (definitive cluster membership test)
  stat:
    path: /etc/pve/corosync.conf
  register: corosync_conf

- name: Set fact — is_cluster_member
  set_fact:
    is_cluster_member: "{{ corosync_conf.stat.exists }}"

- name: Show cluster membership status
  debug:
    msg: "{{ inventory_hostname }} — cluster member: {{ is_cluster_member }}"

# ── Create cluster on sauron ──────────────────────────────────────────────────

- name: Create mordor cluster (sauron only)
  command: pvecm create mordor --link0 {{ ansible_host }}
  when:
    - inventory_hostname == 'sauron'
    - not is_cluster_member
  register: cluster_create

- name: Verify cluster created successfully
  command: pvecm status
  when:
    - inventory_hostname == 'sauron'
    - cluster_create is defined
    - cluster_create.changed
  register: cluster_verify

- name: Show cluster creation result
  debug:
    msg: "{{ cluster_verify.stdout_lines }}"
  when:
    - inventory_hostname == 'sauron'
    - cluster_verify is defined and cluster_verify.stdout is defined

# ── Join cluster on all other nodes ──────────────────────────────────────────

- name: Accept sauron SSH host key on joining node
  shell: |
    ssh-keyscan -H {{ hostvars['sauron']['ansible_host'] }} >> /root/.ssh/known_hosts
    sort -u /root/.ssh/known_hosts -o /root/.ssh/known_hosts
  when:
    - inventory_hostname != 'sauron'
    - not is_cluster_member

- name: Join mordor cluster (non-sauron nodes)
  command: pvecm add {{ hostvars['sauron']['ansible_host'] }} --link0 {{ ansible_host }} --use_ssh
  when:
    - inventory_hostname != 'sauron'
    - not is_cluster_member
  register: cluster_join

- name: Wait for corosync to fully initialise after join
  pause:
    seconds: 45
  when:
    - inventory_hostname != 'sauron'
    - cluster_join is defined
    - cluster_join.changed

- name: Verify node joined successfully
  command: pvecm status
  when:
    - inventory_hostname != 'sauron'
    - cluster_join is defined
    - cluster_join.changed
  register: join_verify
  failed_when: false    # informational only — corosync may still be settling

- name: Show join result
  debug:
    msg: "{{ join_verify.stdout_lines if join_verify.stdout_lines else join_verify.stderr_lines }}"
  when:
    - inventory_hostname != 'sauron'
    - join_verify is defined and join_verify is not skipped
