---
# roles/pve-node-setup/tasks/main.yml
# Per-node Proxmox setup for HP ProDesk 405 G4 / EliteDesk 705 G4 (AMD).
# Run once after Proxmox install, before cluster join.
# Safe to re-run — all tasks are idempotent.
#
# Covers:
#   - Disable swap
#   - CPU performance governor
#   - AMD-Vi IOMMU (GRUB)
#   - Mesa OpenCL (AMD iGPU for Hashtopolis)
#   - Install useful packages (vim, curl, wget, htop, nvme-cli)

# ── Disable swap ──────────────────────────────────────────────────────────────

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent

# ── CPU performance governor ──────────────────────────────────────────────────

- name: Install linux-cpupower
  apt:
    name: linux-cpupower
    state: present

- name: Set CPU governor to performance
  command: cpupower frequency-set -g performance
  changed_when: true

- name: Persist CPU governor across reboots
  copy:
    content: |
      [Service]
      ExecStart=/usr/bin/cpupower frequency-set -g performance
      [Install]
      WantedBy=multi-user.target
      [Unit]
      Description=Set CPU governor to performance
    dest: /etc/systemd/system/cpupower-performance.service
    owner: root
    group: root
    mode: '0644'

- name: Enable cpupower performance service
  systemd:
    name: cpupower-performance
    enabled: true
    daemon_reload: true
    state: started

# ── AMD-Vi IOMMU ──────────────────────────────────────────────────────────────

- name: Check current GRUB_CMDLINE_LINUX_DEFAULT
  command: grep GRUB_CMDLINE_LINUX_DEFAULT /etc/default/grub
  register: grub_current
  changed_when: false

- name: Enable AMD-Vi IOMMU in GRUB
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet amd_iommu=on iommu=pt"'
  register: grub_changed

- name: Update GRUB after change
  command: update-grub
  when: grub_changed.changed

# ── Mesa OpenCL (AMD iGPU) ────────────────────────────────────────────────────

- name: Install Mesa OpenCL for AMD iGPU (Hashtopolis GPU cracking)
  apt:
    name: mesa-opencl-icd
    state: present

# ── Useful packages ───────────────────────────────────────────────────────────

- name: Install useful packages
  apt:
    name:
      - vim
      - curl
      - wget
      - htop
      - nvme-cli
    state: present

# ── Summary ───────────────────────────────────────────────────────────────────

- name: Show setup summary
  debug:
    msg: |
      {{ inventory_hostname }} node setup complete:
        swap:        disabled
        governor:    performance
        IOMMU:       {{ 'already set' if 'amd_iommu' in grub_current.stdout else 'enabled — reboot required' }}
        Mesa OpenCL: installed
        packages:    vim curl wget htop nvme-cli

- name: Reboot required notice
  debug:
    msg: "REBOOT REQUIRED on {{ inventory_hostname }} — GRUB was updated for AMD-Vi IOMMU. Reboot before joining cluster."
  when: grub_changed.changed

# ── Reboot if GRUB was updated ────────────────────────────────────────────────

- name: Reboot node to apply IOMMU and GRUB changes
  reboot:
    msg: "Ansible rebooting node to apply AMD-Vi IOMMU GRUB changes"
    reboot_timeout: 300
    post_reboot_delay: 30
  when: grub_changed.changed

- name: Verify IOMMU is active after reboot
  command: dmesg
  register: dmesg_out
  changed_when: false
  when: grub_changed.changed

- name: Show IOMMU status
  debug:
    msg: "{{ dmesg_out.stdout_lines | select('search', 'iommu|IOMMU') | list }}"
  when: grub_changed.changed and dmesg_out is defined

- name: Verify pve-cluster is still healthy after reboot
  command: pvecm status
  register: pvecm_post_reboot
  changed_when: false
  failed_when: false
  when: grub_changed.changed

- name: Show cluster status after reboot
  debug:
    msg: "{{ pvecm_post_reboot.stdout_lines }}"
  when: grub_changed.changed and pvecm_post_reboot is defined and pvecm_post_reboot.stdout is defined
