---
# roles/pve-repos/tasks/main.yml
# Configures correct Proxmox VE 9 (Debian Trixie) apt repositories.
#
# Fresh PVE 9 install has exactly three files in sources.list.d:
#   - pve-enterprise.sources  — DEB822, disable with Enabled: no
#   - ceph.sources            — DEB822, disable with Enabled: no
#   - debian.sources          — DEB822, rewrite for trixie
#
# We add one file:
#   - pve-no-subscription.sources — DEB822, enable no-sub repo
#
# Safe to run multiple times — all tasks are idempotent.

# ── PVE Enterprise (DEB822) ───────────────────────────────────────────────────

- name: Disable PVE enterprise repository (pve-enterprise.sources)
  copy:
    content: |
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-enterprise
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: no
    dest: /etc/apt/sources.list.d/pve-enterprise.sources
    owner: root
    group: root
    mode: '0644'

# ── Ceph Enterprise (DEB822) ──────────────────────────────────────────────────

- name: Disable Ceph enterprise repository (ceph.sources)
  copy:
    content: |
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: enterprise
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: no
    dest: /etc/apt/sources.list.d/ceph.sources
    owner: root
    group: root
    mode: '0644'

# ── PVE No-Subscription (DEB822) ─────────────────────────────────────────────

- name: Enable PVE no-subscription repository (pve-no-subscription.sources)
  copy:
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
      Enabled: yes
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    owner: root
    group: root
    mode: '0644'

# ── Clear Sources.list─────────────────────────────────────────────────────────
  
- name: Clear /etc/apt/sources.list (managed by sources.list.d only)
  copy:
    content: |
      # This file is intentionally empty.
      # All apt sources are managed in /etc/apt/sources.list.d/
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
    
# ── Refresh cache ─────────────────────────────────────────────────────────────

- name: Update apt cache after repo changes
  apt:
    update_cache: yes

- name: Show repo configuration summary
  debug:
    msg: |
      {{ inventory_hostname }} repo config applied:
        pve-enterprise.sources      : DISABLED (Enabled: no)
        ceph.sources                : DISABLED (Enabled: no)
        pve-no-subscription.sources : ENABLED  (trixie)
        debian.sources              : untouched (correct on fresh install)

