[defaults]
inventory           = inventory/hosts.ini
remote_user         = root
private_key_file    = ~/.ssh/id_ed25519
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = /usr/bin/python3

# Serial=1 means nodes are updated one at a time by default.
# Override with --forks N on the command line if you want parallel runs
# (not recommended for updates — verify each node rejoins cluster first).
[ssh_connection]
pipelining = True
